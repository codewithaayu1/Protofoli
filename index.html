<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AAYU | Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#020408;
  --surface:#060c14;
  --card:#0a1628;
  --gold:#ffd700;
  --cyan:#00f5ff;
  --green:#1DB954;
  --text:#e8f4ff;
  --muted:#4a6080;
}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);color:var(--text);
  font-family:"Rajdhani",sans-serif;
  overflow-x:hidden;cursor:none;
  -webkit-font-smoothing:antialiased;
  animation:pageIn .6s ease both;
}
@keyframes pageIn{from{opacity:0;}to{opacity:1;}}

/* CURSOR */
#cur{width:8px;height:8px;background:var(--gold);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;box-shadow:0 0 10px #ffd700,0 0 30px #ffd70088;transition:transform .1s;}
#cur2{width:38px;height:38px;border:1.5px solid var(--cyan);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;opacity:.5;transition:left .12s ease,top .12s ease;}

/* STARS */
#sc{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* SCANLINES */
body::after{content:"";position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,245,255,.008) 3px,rgba(0,245,255,.008) 4px);pointer-events:none;z-index:998;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:500;display:flex;align-items:center;justify-content:space-between;padding:1.2rem 3rem;background:rgba(2,4,8,.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,215,0,.15);}
nav::after{content:"";position:absolute;bottom:0;left:5%;right:5%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);box-shadow:0 0 15px #ffd700;}
.nav-logo{font-family:"Orbitron",sans-serif;font-size:1.5rem;font-weight:900;color:var(--gold);letter-spacing:6px;text-decoration:none;text-shadow:0 0 20px #ffd700,0 0 50px #ffd70066;animation:gPulse 3s ease-in-out infinite;}
@keyframes gPulse{0%,100%{text-shadow:0 0 15px #ffd700,0 0 40px #ffd70066;}50%{text-shadow:0 0 30px #ffd700,0 0 80px #ffd700,0 0 120px #ffd70044;}}
.nav-links{display:flex;gap:2rem;list-style:none;}
.nav-links a{color:var(--muted);text-decoration:none;font-family:"Orbitron",sans-serif;font-size:.6rem;letter-spacing:3px;text-transform:uppercase;transition:all .3s;}
.nav-links a:hover{color:var(--gold);text-shadow:0 0 12px #ffd700;}

/* SECTIONS */
section{padding:6rem 3rem;position:relative;z-index:10;scroll-margin-top:80px;}
.si{max-width:1160px;margin:0 auto;}
.sl{font-family:"Share Tech Mono",monospace;font-size:.7rem;letter-spacing:4px;color:var(--cyan);margin-bottom:.8rem;text-shadow:0 0 10px var(--cyan);}
.st{font-family:"Orbitron",sans-serif;font-size:clamp(2.2rem,5vw,4rem);font-weight:900;letter-spacing:2px;line-height:1;margin-bottom:2.5rem;text-shadow:0 0 20px rgba(255,215,0,.25);}
.gt{color:var(--gold);text-shadow:0 0 15px #ffd700,0 0 40px #ffd70066;}

/* HERO */
#home{min-height:100vh;display:flex;align-items:center;padding:7rem 3rem 3rem;overflow:hidden;}
.hbg{position:absolute;inset:0;background:radial-gradient(ellipse 60% 60% at 75% 50%,rgba(255,215,0,.06),transparent 70%),radial-gradient(ellipse 40% 40% at 20% 60%,rgba(0,245,255,.05),transparent 60%);}
.hgrid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,245,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,.04) 1px,transparent 1px);background-size:70px 70px;mask-image:linear-gradient(to bottom,transparent,black 25%,black 75%,transparent);}
.hcont{position:relative;z-index:2;max-width:1160px;margin:0 auto;display:grid;grid-template-columns:1.2fr 1fr;gap:3rem;align-items:center;width:100%;}
.hbadge{display:inline-flex;align-items:center;gap:.5rem;font-family:"Share Tech Mono",monospace;font-size:.65rem;letter-spacing:3px;color:var(--cyan);border:1px solid rgba(0,245,255,.25);padding:.4rem 1rem;margin-bottom:1.2rem;box-shadow:0 0 15px rgba(0,245,255,.1);animation:fadeUp .7s ease both;}
.bdot{width:7px;height:7px;background:var(--green);border-radius:50%;box-shadow:0 0 8px var(--green);animation:blink 1.5s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.1;}}
.hname{font-family:"Orbitron",sans-serif;font-size:clamp(4rem,9vw,8rem);font-weight:900;letter-spacing:4px;line-height:.9;animation:fadeUp .7s .15s ease both;}
.ha{color:var(--gold);text-shadow:0 0 20px #ffd700,0 0 60px #ffd70066;display:inline-block;animation:floatA 4s ease-in-out infinite;}
@keyframes floatA{0%,100%{transform:translateY(0) rotateY(0);}50%{transform:translateY(-8px) rotateY(6deg);}}
.hrole{font-family:"Share Tech Mono",monospace;font-size:.9rem;color:var(--cyan);letter-spacing:3px;margin-top:.8rem;text-shadow:0 0 10px var(--cyan);animation:fadeUp .7s .3s ease both;}
.hdesc{font-size:1.05rem;color:var(--muted);line-height:1.8;margin-top:.8rem;animation:fadeUp .7s .4s ease both;}
.hdesc strong{color:var(--gold);text-shadow:0 0 8px rgba(255,215,0,.4);}
.hcta{display:flex;gap:1rem;margin-top:1.8rem;flex-wrap:wrap;animation:fadeUp .7s .55s ease both;}

/* BUTTONS */
.btn-g{display:inline-block;padding:.85rem 2rem;font-family:"Orbitron",sans-serif;font-size:.65rem;letter-spacing:3px;text-transform:uppercase;text-decoration:none;cursor:none;transition:all .35s cubic-bezier(.23,1,.32,1);}
.btn-gold{background:linear-gradient(135deg,#ffd700,#ffaa00);color:#000;font-weight:900;box-shadow:0 6px 0 #b8860b,0 8px 25px rgba(255,215,0,.4);clip-path:polygon(8px 0%,100% 0%,100% calc(100% - 8px),calc(100% - 8px) 100%,0% 100%,0% 8px);}
.btn-gold:hover{transform:translateY(-4px);box-shadow:0 10px 0 #b8860b,0 14px 40px rgba(255,215,0,.6);}
.btn-cyan{background:transparent;color:var(--cyan);font-weight:700;border:1px solid rgba(0,245,255,.35);box-shadow:0 0 15px rgba(0,245,255,.1);clip-path:polygon(8px 0%,100% 0%,100% calc(100% - 8px),calc(100% - 8px) 100%,0% 100%,0% 8px);}
.btn-cyan:hover{background:rgba(0,245,255,.08);box-shadow:0 0 30px rgba(0,245,255,.4);transform:translateY(-4px);}

/* PROFILE PHOTO */
.hwrap{display:flex;justify-content:center;align-items:center;perspective:1000px;animation:fadeUp .7s .2s ease both;}
.p3d{position:relative;width:300px;height:370px;transform-style:preserve-3d;animation:cardFloat 7s ease-in-out infinite;}
@keyframes cardFloat{0%,100%{transform:rotateY(-8deg) rotateX(3deg);}50%{transform:rotateY(8deg) rotateX(-3deg);}}
.pout{position:absolute;inset:-3px;background:linear-gradient(135deg,#ffd700,#00f5ff,#ff006e,#ffd700);background-size:300% 300%;animation:gradShift 4s ease infinite;clip-path:polygon(0 0,calc(100% - 22px) 0,100% 22px,100% 100%,22px 100%,0 calc(100% - 22px));filter:blur(.8px);}
@keyframes gradShift{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
.pin{position:absolute;inset:0;clip-path:polygon(0 0,calc(100% - 22px) 0,100% 22px,100% 100%,22px 100%,0 calc(100% - 22px));overflow:hidden;}
.pin img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;transition:transform .5s;}
.p3d:hover .pin img{transform:scale(1.05);}
.pcorner{position:absolute;width:18px;height:18px;border-color:var(--gold);border-style:solid;box-shadow:0 0 8px var(--gold);}
.ptl{top:8px;left:8px;border-width:2px 0 0 2px;}
.ptr{top:8px;right:8px;border-width:2px 2px 0 0;}
.pbl{bottom:8px;left:8px;border-width:0 0 2px 2px;}
.pbr{bottom:8px;right:8px;border-width:0 2px 2px 0;}
.pbadge{position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#ffd700,#ffaa00);color:#000;font-family:"Orbitron",sans-serif;font-size:.55rem;font-weight:900;letter-spacing:2px;padding:.4rem 1.2rem;white-space:nowrap;box-shadow:0 0 20px rgba(255,215,0,.5);}

@keyframes fadeUp{from{opacity:0;transform:translateY(25px);}to{opacity:1;transform:translateY(0);}}

/* ABOUT */
#about{background:linear-gradient(180deg,var(--bg),var(--surface));}
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:4rem;}
.typing-box{background:var(--card);border:1px solid rgba(0,245,255,.15);padding:1.8rem;position:relative;clip-path:polygon(0 0,calc(100% - 14px) 0,100% 14px,100% 100%,14px 100%,0 calc(100% - 14px));box-shadow:0 0 25px rgba(0,245,255,.05);margin-bottom:1.8rem;}
.typing-box::before{content:"// ABOUT.exe";position:absolute;top:-10px;left:18px;font-family:"Share Tech Mono",monospace;font-size:.6rem;letter-spacing:2px;color:var(--cyan);background:var(--card);padding:0 .5rem;text-shadow:0 0 8px var(--cyan);}
#typed{font-family:"Share Tech Mono",monospace;font-size:.88rem;line-height:1.9;color:var(--text);min-height:180px;}
#typed .tc{text-shadow:0 0 6px rgba(232,244,255,.7),0 0 15px rgba(0,245,255,.25);}
.tcur{display:inline-block;width:2px;height:1em;background:var(--gold);vertical-align:middle;box-shadow:0 0 8px var(--gold);animation:cblink .7s step-end infinite;}
@keyframes cblink{0%,100%{opacity:1;}50%{opacity:0;}}
.stats4{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.scard{background:var(--card);border:1px solid rgba(255,215,0,.12);padding:1.3rem;text-align:center;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));transition:all .4s cubic-bezier(.23,1,.32,1);}
.scard:hover{transform:translateY(-6px);border-color:rgba(255,215,0,.4);box-shadow:0 15px 40px rgba(255,215,0,.12);}
.snum{font-family:"Orbitron",sans-serif;font-size:1.8rem;font-weight:900;color:var(--gold);text-shadow:0 0 12px #ffd700;}
.slbl{font-family:"Share Tech Mono",monospace;font-size:.6rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:.2rem;}
.educard{background:var(--card);border:1px solid rgba(0,245,255,.12);border-left:3px solid var(--cyan);padding:1.6rem;margin-bottom:1.2rem;transition:all .35s cubic-bezier(.23,1,.32,1);}
.educard:hover{transform:translateX(8px);box-shadow:-3px 0 25px rgba(0,245,255,.2);}
.edeg{font-family:"Orbitron",sans-serif;font-size:.8rem;font-weight:700;letter-spacing:1px;margin-bottom:.3rem;}
.esc{color:var(--cyan);font-size:.82rem;margin-bottom:.2rem;text-shadow:0 0 6px rgba(0,245,255,.3);}
.eyr{color:var(--muted);font-size:.75rem;font-family:"Share Tech Mono",monospace;}

/* SKILLS */
#skills{background:var(--surface);}
.skgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.3rem;}
.skcard{background:var(--card);border:1px solid rgba(255,215,0,.1);padding:1.8rem;position:relative;overflow:hidden;transition:all .4s cubic-bezier(.23,1,.32,1);clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));}
.skcard::after{content:"";position:absolute;top:0;left:-100%;width:100%;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);transition:left .5s;box-shadow:0 0 8px var(--gold);}
.skcard:hover{transform:translateY(-8px) rotateX(4deg);border-color:rgba(255,215,0,.4);box-shadow:0 20px 45px rgba(0,0,0,.5),0 0 25px rgba(255,215,0,.1);}
.skcard:hover::after{left:100%;}
.skico{font-size:2.2rem;margin-bottom:.8rem;display:block;filter:drop-shadow(0 0 6px rgba(255,215,0,.4));}
.skname{font-family:"Orbitron",sans-serif;font-size:.78rem;font-weight:700;color:var(--gold);text-shadow:0 0 8px rgba(255,215,0,.3);letter-spacing:1px;margin-bottom:.4rem;}
.skdesc{color:var(--muted);font-size:.85rem;line-height:1.6;}
.skbar{margin-top:1rem;height:3px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden;}
.skfill{height:100%;background:linear-gradient(90deg,var(--gold),var(--cyan));border-radius:3px;width:0%;transition:width 1.5s cubic-bezier(.23,1,.32,1);}

/* SERVICES */
#services{background:var(--bg);}
.svgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:1.8rem;}
.svcard{background:var(--card);border:1px solid rgba(0,245,255,.1);padding:2.2rem;position:relative;overflow:hidden;transition:all .4s cubic-bezier(.23,1,.32,1);clip-path:polygon(0 0,calc(100% - 18px) 0,100% 18px,100% 100%,18px 100%,0 calc(100% - 18px));}
.svcard:hover{transform:translateY(-8px) rotateY(2deg);border-color:rgba(0,245,255,.3);box-shadow:0 25px 55px rgba(0,245,255,.08);}
.svnum{font-family:"Orbitron",sans-serif;font-size:3.5rem;font-weight:900;color:rgba(0,245,255,.07);line-height:1;margin-bottom:.8rem;}
.svname{font-family:"Orbitron",sans-serif;font-size:.92rem;font-weight:700;margin-bottom:.6rem;letter-spacing:1px;}
.svdesc{color:var(--muted);line-height:1.7;font-size:.9rem;}
.svtag{display:inline-block;margin-top:1.2rem;font-family:"Share Tech Mono",monospace;font-size:.6rem;letter-spacing:2px;color:var(--cyan);border:1px solid rgba(0,245,255,.2);padding:.25rem .7rem;text-shadow:0 0 6px var(--cyan);}
.svline{position:absolute;bottom:0;left:0;width:0;height:2px;background:linear-gradient(90deg,var(--cyan),var(--gold));transition:width .5s;box-shadow:0 0 8px var(--cyan);}
.svcard:hover .svline{width:100%;}
